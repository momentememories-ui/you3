<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>บัตรง้ออ้วม 💜</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #8e44ad;
            --paper-bg: #ffffff;
            --header-blue: #7d8cc4;
        }

        body {
            margin: 0; padding: 0;
            background: #000;
            font-family: 'Mali', cursive;
            width: 100vw; height: 100dvh;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer;
            transition: opacity 0.5s;
        }
        .start-btn {
            padding: 15px 40px; border-radius: 50px;
            background: var(--primary-purple); color: #fff;
            font-size: 1.3rem; border: none; font-family: 'Mali', cursive;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

        #firework-text {
            position: absolute; top: 35%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10; opacity: 0; transition: opacity 1s;
            text-align: center; width: 100%;
        }
        .glowing-text {
            font-size: 2.2rem; font-weight: 700;
            color: #e0aaff; text-shadow: 0 0 20px #8e44ad;
        }

        .card-container {
            position: relative; z-index: 100;
            width: 85%; max-width: 380px;
            display: none;
        }

        .paper-card {
            background: var(--paper-bg);
            border-radius: 20px;
            padding: 50px 25px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            color: #333;
            text-align: center;
            position: relative;
        }

        .card-header {
            background: var(--header-blue);
            color: white;
            display: inline-block;
            padding: 10px 40px;
            border-radius: 15px;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .content-text {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 35px;
            min-height: 90px;
        }

        .options-group {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .option-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            background: none; border: none; font-family: 'Mali', cursive;
        }

        .check-box {
            width: 40px; height: 40px;
            border-radius: 10px;
            transition: all 0.2s;
        }
        .box-orange { background: #d08a5d; border: none; }
        .box-green { background: #b5c9b4; border: none; }

        .label-text { font-size: 1.2rem; color: #555; font-weight: 600; }

        /* --- ปรับสติกเกอร์ให้ใหญ่ขึ้นตามสั่ง --- */
        .deco-sticker {
            position: absolute;
            pointer-events: none;
            z-index: 105;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }
        #sticker-top { width: 130px; top: -70px; right: -25px; } /* photo4 ใหญ่ขึ้นมาก */
        #sticker-bottom { width: 120px; bottom: -60px; left: -20px; } /* photo5 ใหญ่ขึ้นมาก */
        
        #dynamic-sticker { 
            width: 160px; /* รูปแมวตอนกดปุ่ม ใหญ่สะใจ */
            margin-top: 20px; 
            display: none; 
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

    <audio id="bg-music" loop><source src="song.mp3" type="audio/mpeg"></audio>

    <div id="start-screen" onclick="startSequence()">
        <div class="start-btn">อ้วม แตะหน้าจอดูสิ... 👈</div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="firework-text">
        <h1 class="glowing-text">เค้ามีธุระสำคัญจะบอก... 💜</h1>
    </div>

    <div class="card-container" id="card">
        <img src="photo4.png" id="sticker-top" class="deco-sticker" alt="">
        <img src="photo5.png" id="sticker-bottom" class="deco-sticker" alt="">

        <div class="paper-card">
            <div id="card-header-el" class="card-header">บัตรง้อ</div>
            
            <div id="main-text" class="content-text">
                รู้ว่าทำตัวไม่ดี<br>
                ให้อภัยกันได้ไหม
            </div>

            <div id="options" class="options-group">
                <button class="option-item" onclick="handleAction('success')">
                    <div class="check-box box-orange"></div>
                    <span class="label-text">หายงอน</span>
                </button>

                <button class="option-item" onclick="handleAction('angry')">
                    <div class="check-box box-green"></div>
                    <span class="label-text">ไม่หายงอน</span>
                </button>
            </div>

            <center><img src="" id="dynamic-sticker" alt=""></center>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const audio = document.getElementById('bg-music');
        let cw, ch, particles = [];

        function resize() { cw = window.innerWidth; ch = window.innerHeight; canvas.width = cw; canvas.height = ch; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor(x, y, hue) {
                this.x = x; this.y = y;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 5 + 2;
                this.friction = 0.95; this.gravity = 0.2;
                this.hue = hue; this.alpha = 1; this.decay = 0.01;
            }
            update() {
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${this.alpha})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2); ctx.fill();
            }
        }

        function createFirework() {
            const tx = Math.random() * cw; const ty = Math.random() * (ch/2);
            const hue = Math.random() * 360;
            let count = 60; while(count--) particles.push(new Particle(tx, ty, hue));
        }

        function loop() {
            requestAnimationFrame(loop);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; ctx.fillRect(0, 0, cw, ch);
            ctx.globalCompositeOperation = 'lighter';
            particles.forEach((p, i) => {
                p.update(); p.draw(); if(p.alpha <= 0) particles.splice(i, 1);
            });
            if(Math.random() < 0.04) createFirework();
        }

        function startSequence() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('start-screen').style.display = 'none';
                audio.play().catch(()=>{});
                loop();
                const fwText = document.getElementById('firework-text');
                fwText.style.opacity = '1';
                setTimeout(() => {
                    fwText.style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('card').style.display = 'block';
                    }, 500);
                }, 3000);
            }, 500);
        }

        function handleAction(type) {
            const mainText = document.getElementById('main-text');
            const options = document.getElementById('options');
            const dynSticker = document.getElementById('dynamic-sticker');
            const header = document.getElementById('card-header-el');

            if (type === 'angry') {
                mainText.innerHTML = "ดีกันเถอะนะ...<br>เค้าขอโทษจริงๆ นะคะ 🥺";
                dynSticker.src = "photo1.png";
                dynSticker.style.display = "block";
                options.style.visibility = "hidden";
                setTimeout(() => { 
                    options.style.visibility = "visible"; 
                    mainText.innerHTML = "รู้ว่าทำตัวไม่ดี<br>ให้อภัยกันได้ไหม";
                    dynSticker.style.display = "none";
                }, 4000);
            } else if (type === 'success') {
                header.innerHTML = "เย้! 💜";
                header.style.background = "#9b59b6";
                mainText.innerHTML = "ขอบคุณครับบ...<br>รักอ้วมที่สุดในโลกเลย 🥰";
                dynSticker.src = "photo3.png";
                dynSticker.style.display = "block";
                options.style.display = "none";
            }
        }
    </script>
</body>
</html>
