<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>บัตรง้ออ้วม 💜</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #8e44ad;
            --paper-bg: #ffffff;
            --header-blue: #7d8cc4; /* สีแถบบัตรง้อตามรูป */
        }

        body {
            margin: 0; padding: 0;
            background: #000;
            font-family: 'Mali', cursive;
            width: 100vw; height: 100dvh;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* --- หน้าจอเริ่ม --- */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }
        .start-btn {
            padding: 15px 40px; border-radius: 50px;
            background: var(--primary-purple); color: #fff;
            font-size: 1.3rem; border: none; font-family: 'Mali', cursive;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

        /* --- ตัวบัตรง้อ (ดีไซน์ตามรูป) --- */
        .card-container {
            position: relative; z-index: 100;
            width: 90%; max-width: 400px;
            perspective: 1000px; display: none;
        }

        .paper-card {
            background: var(--paper-bg);
            border-radius: 15px;
            padding: 40px 20px;
            box-shadow: 10px 10px 0px rgba(255,255,255,0.1), 0 20px 40px rgba(0,0,0,0.5);
            color: #333;
            transform: rotate(-2deg); /* เอียงเล็กน้อยตามรูป */
            position: relative;
        }

        .card-header {
            background: var(--header-blue);
            color: white;
            display: inline-block;
            padding: 5px 25px;
            border-radius: 10px;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 25px;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        .content-text {
            font-size: 1.4rem;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* --- ส่วนของปุ่มติ๊กถูก --- */
        .options-group {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 20px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 1.3rem;
            background: none; border: none; font-family: 'Mali', cursive;
        }

        .check-box {
            width: 35px; height: 35px;
            border-radius: 8px;
            border: 2px solid #ddd;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s;
        }
        
        .box-orange { background: #d08a5d; border-color: #d08a5d; } /* สีส้มตามรูป */
        .box-green { background: #b5c9b4; border-color: #b5c9b4; } /* สีเขียวตามรูป */

        .sticker-img {
            width: 40px; height: 40px;
            object-fit: contain;
        }

        /* --- หน้าไม่หายงอน --- */
        #angry-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(243, 229, 245, 0.95); z-index: 200;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }

        /* --- หน้าสำเร็จ --- */
        #success-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 300;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }

        .full-img { width: 200px; margin-bottom: 20px; }
        .kuromi-float { width: 80px; position: absolute; bottom: 20px; right: 20px; }

    </style>
</head>
<body>

    <audio id="bg-music" loop><source src="song.mp3" type="audio/mpeg"></audio>

    <div id="start-screen" onclick="init()">
        <div class="start-btn">เปิดบัตรง้อ ✉️</div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="card-container" id="card">
        <div class="paper-card">
            <div class="card-header">บัตรง้อ</div>
            
            <div class="content-text">
                รู้ว่าทำตัวไม่ดี<br>
                ให้อภัยกันได้มั้ย
            </div>

            <img src="photo4.png" style="width: 60px; position: absolute; top: -30px; right: 10px;" alt="">

            <div class="options-group">
                <button class="option-item" onclick="showSuccess()">
                    <div class="check-box box-orange">
                        <img src="photo1.png" class="sticker-img" alt="">
                    </div>
                    <span>ได้</span>
                </button>

                <button class="option-item" onclick="showAngry()">
                    <div class="check-box box-green">
                        <img src="photo6.png" class="sticker-img" alt="">
                    </div>
                    <span>ได้</span>
                </button>
            </div>
            
            <img src="photo5.png" style="width: 50px; margin-top: 20px;" alt="">
        </div>
    </div>

    <div id="angry-overlay">
        <img src="photo1.png" class="full-img" alt="">
        <h2 style="color:#333">ดีกันเถอะน๊าาา 🥺</h2>
        <p style="color:#666">เค้าขอโทษจริงๆ นะคะ...</p>
        <img src="photo2.png" style="width:120px;" alt="">
        <img src="photo6.png" class="kuromi-float">
    </div>

    <div id="success-overlay">
        <h1 style="color:var(--primary-purple); font-size: 2.5rem;">เย้! ขอบคุณค้าบ 💜</h1>
        <img src="photo3.png" class="full-img" alt="">
        <p style="color:#333; font-size: 1.2rem;">รักอ้วมที่สุดเลยยย 🥰</p>
        <img src="photo7.png" class="kuromi-float" style="animation: bounce 1s infinite;">
    </div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let cw, ch;
        function resize() { cw = window.innerWidth; ch = window.innerHeight; canvas.width = cw; canvas.height = ch; }
        window.addEventListener('resize', resize); resize();

        let particles = [];
        class Particle {
            constructor(x, y, hue) {
                this.x = x; this.y = y;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 5 + 2;
                this.friction = 0.95; this.gravity = 0.2;
                this.hue = hue; this.alpha = 1; this.decay = 0.01;
            }
            update() {
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${this.alpha})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2); ctx.fill();
            }
        }

        function createFirework() {
            const tx = Math.random() * cw; const ty = Math.random() * (ch/2);
            const hue = Math.random() * 360;
            let count = 60; while(count--) particles.push(new Particle(tx, ty, hue));
        }

        function loop() {
            requestAnimationFrame(loop);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; ctx.fillRect(0, 0, cw, ch);
            ctx.globalCompositeOperation = 'lighter';
            particles.forEach((p, i) => {
                p.update(); p.draw(); if(p.alpha <= 0) particles.splice(i, 1);
            });
            if(Math.random() < 0.03) createFirework();
        }

        function init() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('bg-music').play().catch(()=>{});
            document.getElementById('card').style.display = 'block';
            loop();
        }

        function showAngry() {
            const el = document.getElementById('angry-overlay');
            el.style.display = 'flex';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        function showSuccess() {
            document.getElementById('success-overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
